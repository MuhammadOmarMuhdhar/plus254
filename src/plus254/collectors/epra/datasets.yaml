pump_prices:
  name: Fuel Pump Prices
  slug: energy
  source: Energy and Petroleum Regulatory Authority (EPRA)
  description: Monthly pump prices of petroleum products in Kenya
  url: https://www.epra.go.ke/pump-prices
  columns:
    date:
      type: date
      description: Publication date
    year:
      type: integer
      description: Calendar year
    month:
      type: string
      description: Calendar month name (e.g., January)
    location:
      type: string
      description: Town or city of the pump price
    item:
      type: string
      description: Petroleum product type
    value:
      type: float
      description: Pump price in Kenyan Shillings (KES)
  last_updated: '2026-06-24T17:38:39'
  update_frequency: monthly

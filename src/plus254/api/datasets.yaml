forex_end_period:
  name: Monthly Exchange Rates (End Period)
  slug: centralbank
  source: Central Bank of Kenya
  description: Monthly exchange rates of major currencies against KES (end period)
  url: https://www.centralbank.go.ke/uploads/exchange_rates/677633335_Monthly%20exchange%20rate%20(end%20period).csv
  columns:
    year:
      type: integer
      description: Calendar year
    month:
      type: string
      description: Calendar month name (e.g., January)
    metric:
      type: string
      description: Foreign currency name (e.g., united states dollar, sterling pound)
    value:
      type: string
      description: End-period exchange rate in KES per unit of foreign currency (comma-formatted number)


rov_per_polling_station:
  name: Registered Voters per Polling Station
  slug: iebc
  source: Independent Electoral and Boundaries Commission (IEBC) Kenya
  description: Number of registered voters per polling station across all 47 counties for the 2022 General Election
  url: https://www.iebc.or.ke/docs/rov_per_polling_station.pdf
  columns:
    county_code:
      type: string
      description: 3-digit numeric county code
    county_name:
      type: string
      description: County name
    const_code:
      type: string
      description: Constituency code
    const_name:
      type: string
      description: Constituency name
    caw_code:
      type: string
      description: County Assembly Ward code
    caw_name:
      type: string
      description: County Assembly Ward name
    reg_centre_code:
      type: string
      description: Registration Centre code
    reg_centre_name:
      type: string
      description: Registration Centre name
    polling_station_code:
      type: string
      description: Unique polling station code
    polling_station_name:
      type: string
      description: Polling station name
    registered_voters:
      type: integer
      description: Number of registered voters at the polling station

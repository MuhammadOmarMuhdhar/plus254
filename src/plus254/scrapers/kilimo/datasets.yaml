production_value_livestock:
  name: Production Value (Livestock)
  slug: agriculture
  source: Kenya Agricultural Observatory Platform (Kilimo)
  description: Value of livestock production across Kenyan counties
  url: https://statistics.kilimo.go.ke
  columns:
    year:
      type: string
      description: Calendar year
    area_level:
      type: string
      description: Geographic level (always county)
    area_name:
      type: string
      description: County name (lowercased)
    metric:
      type: string
      description: Sub-domain or category within the indicator (lowercased)
    item:
      type: string
      description: Specific item or commodity being measured (lowercased)
    value:
      type: float
      description: Numeric value of the indicator
  last_updated: '2026-06-15T12:42:19'

